<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronify — Add Event</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1814;
      --ink-muted: #6b6760;
      --ink-faint: #b0ada8;
      --surface: #faf9f7;
      --surface-alt: #f0ede8;
      --border: rgba(26,24,20,0.12);
      --border-strong: rgba(26,24,20,0.22);
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --accent-text: #085041;
      --nav-h: 64px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--nav-h);
      background: rgba(250,249,247,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 3rem;
    }

    .nav-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-logo span { color: var(--accent); }

    nav ul {
      list-style: none;
      display: flex;
      gap: 0.25rem;
    }

    nav ul li a {
      display: block;
      padding: 0.4rem 0.9rem;
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    nav ul li a:hover { color: var(--ink); background: var(--surface-alt); }
    nav ul li a.active { color: var(--accent-text); background: var(--accent-light); }

    /* PAGE WRAPPER */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    /* SECTION LABEL */
    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section-label::before {
      content: '';
      width: 20px;
      height: 1px;
      background: var(--accent);
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: var(--border);
    }

    /* FORM CARD */
    .form-card {
      background: #fff;
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    /* FIELDS */
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 1.1rem;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-muted);
      letter-spacing: 0.02em;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    textarea {
      padding: 0.6rem 0.85rem;
      border: 0.5px solid var(--border-strong);
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--surface);
      outline: none;
      width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
    }

    textarea { resize: vertical; min-height: 80px; }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* CATEGORY PILLS */
    .cat-opts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .catopt {
      padding: 5px 14px;
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink-muted);
      background: transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .catopt:hover { background: var(--surface-alt); color: var(--ink); }

    .catopt.sel-work   { background: #E6F1FB; border-color: #378ADD; color: #0C447C; }
    .catopt.sel-focus  { background: #E1F5EE; border-color: #1D9E75; color: #085041; }
    .catopt.sel-personal { background: #FBEAF0; border-color: #D4537E; color: #72243E; }
    .catopt.sel-social { background: #EEEDFE; border-color: #7F77DD; color: #3C3489; }
    .catopt.sel-break  { background: var(--surface-alt); border-color: var(--border-strong); color: var(--ink-muted); }
    .catopt.sel-other  { background: var(--surface-alt); border-color: var(--border-strong); color: var(--ink-muted); }

    /* COLOR DOTS */
    .color-row {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }

    .cdot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }

    .cdot:hover { transform: scale(1.15); }
    .cdot.sel { border-color: var(--ink); }

    /* PILL TOGGLES (repeat / reminder) */
    .pill-opts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .pillopt {
      padding: 5px 14px;
      border: 0.5px solid var(--border-strong);
      border-radius: 20px;
      font-size: 0.78rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink-muted);
      background: transparent;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .pillopt:hover { background: var(--surface-alt); color: var(--ink); }
    .pillopt.sel { background: var(--accent-light); color: var(--accent-text); border-color: var(--accent); }

    /* PREVIEW */
    .preview-card {
      border: 0.5px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      background: var(--surface);
      margin-bottom: 1rem;
      display: none;
    }

    .preview-card.visible { display: block; }

    .preview-label {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.6rem;
    }

    .preview-evt {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .preview-bar {
      width: 4px;
      height: 40px;
      border-radius: 2px;
      flex-shrink: 0;
      background: var(--accent);
    }

    .preview-title { font-size: 0.95rem; font-weight: 500; }
    .preview-meta  { font-size: 0.75rem; color: var(--ink-muted); margin-top: 2px; }

    /* SUCCESS */
    .success-banner {
      background: var(--accent-light);
      border: 0.5px solid #5DCAA5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.83rem;
      color: var(--accent-text);
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .success-banner.visible { display: flex; }

    /* ACTIONS */
    .form-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 0.25rem;
    }

    .btn-ghost {
      padding: 0.6rem 1.2rem;
      border: 0.5px solid var(--border-strong);
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      color: var(--ink-muted);
      background: transparent;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    .btn-save {
      padding: 0.6rem 1.4rem;
      border: none;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-save:hover { background: #0F6E56; }

    /* BYLINE */
    .byline {
      font-size: 0.75rem;
      color: var(--ink-faint);
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 0.5px solid var(--border);
    }

    .byline strong { color: var(--ink-muted); font-weight: 500; }

    @media (max-width: 600px) {
      nav { padding: 0 1.25rem; }
      nav ul { display: none; }
      .page { padding: 2rem 1.25rem; }
      .row2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Chron<span>ify</span></a>
    <ul>
      <li><a href="index.html">Home page</a></li>
      <li><a href="day-overview.html">Day overview</a></li>
      <li><a href="add-event.html" class="active">Adding events</a></li>
      <li><a href="calendar.html">Completed calendar</a></li>
    </ul>
  </nav>

  <main class="page">

    <div class="section-label">Add event</div>

    <!-- SUCCESS BANNER -->
    <div class="success-banner" id="success-banner">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0">
        <circle cx="7" cy="7" r="6" stroke="#1D9E75" stroke-width="1.2"/>
        <path d="M4.5 7l2 2 3-3" stroke="#1D9E75" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Event saved! Head to the calendar to see it.
    </div>

    <!-- CARD 1 — BASICS -->
    <div class="form-card">
      <div class="field">
        <label for="f-title">Event title</label>
        <input type="text" id="f-title" placeholder="e.g. Team standup" oninput="updatePreview()">
      </div>

      <div class="field">
        <label>Category</label>
        <div class="cat-opts">
          <button class="catopt sel-work" data-cat="Work" onclick="selCat(this)">Work</button>
          <button class="catopt" data-cat="Focus" onclick="selCat(this)">Focus</button>
          <button class="catopt" data-cat="Personal" onclick="selCat(this)">Personal</button>
          <button class="catopt" data-cat="Social" onclick="selCat(this)">Social</button>
          <button class="catopt" data-cat="Break" onclick="selCat(this)">Break</button>
          <button class="catopt" data-cat="Other" onclick="selCat(this)">Other</button>
        </div>
      </div>

      <div class="row2">
        <div class="field" style="margin-bottom:0">
          <label for="f-date">Date</label>
          <input type="date" id="f-date" oninput="updatePreview()">
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="f-loc">Location (optional)</label>
          <input type="text" id="f-loc" placeholder="e.g. Room 204, Zoom">
        </div>
      </div>

      <div class="row2" style="margin-top:1rem">
        <div class="field" style="margin-bottom:0">
          <label for="f-start">Start time</label>
          <input type="time" id="f-start" oninput="updatePreview()">
        </div>
        <div class="field" style="margin-bottom:0">
          <label for="f-end">End time</label>
          <input type="time" id="f-end" oninput="updatePreview()">
        </div>
      </div>
    </div>

    <!-- CARD 2 — PERSONALISATION -->
    <div class="form-card">
      <div class="field">
        <label>Colour tag</label>
        <div class="color-row" id="color-row">
          <div class="cdot sel" style="background:#1D9E75" data-color="#1D9E75" onclick="selColor(this)"></div>
          <div class="cdot" style="background:#378ADD" data-color="#378ADD" onclick="selColor(this)"></div>
          <div class="cdot" style="background:#D4537E" data-color="#D4537E" onclick="selColor(this)"></div>
          <div class="cdot" style="background:#7F77DD" data-color="#7F77DD" onclick="selColor(this)"></div>
          <div class="cdot" style="background:#BA7517" data-color="#BA7517" onclick="selColor(this)"></div>
          <div class="cdot" style="background:#888780" data-color="#888780" onclick="selColor(this)"></div>
        </div>
      </div>

      <div class="field">
        <label>Repeat</label>
        <div class="pill-opts">
          <button class="pillopt sel" onclick="selPill(this)">None</button>
          <button class="pillopt" onclick="selPill(this)">Daily</button>
          <button class="pillopt" onclick="selPill(this)">Weekly</button>
          <button class="pillopt" onclick="selPill(this)">Biweekly</button>
          <button class="pillopt" onclick="selPill(this)">Monthly</button>
        </div>
      </div>

      <div class="field" style="margin-bottom:0">
        <label>Reminder</label>
        <div class="pill-opts">
          <button class="pillopt sel" onclick="selPill(this)">None</button>
          <button class="pillopt" onclick="selPill(this)">5 min before</button>
          <button class="pillopt" onclick="selPill(this)">15 min before</button>
          <button class="pillopt" onclick="selPill(this)">30 min before</button>
          <button class="pillopt" onclick="selPill(this)">1 hr before</button>
        </div>
      </div>
    </div>

    <!-- CARD 3 — NOTES -->
    <div class="form-card">
      <div class="field" style="margin-bottom:0">
        <label for="f-notes">Notes (optional)</label>
        <textarea id="f-notes" placeholder="Any extra details, links, or context..."></textarea>
      </div>
    </div>

    <!-- LIVE PREVIEW -->
    <div class="preview-card" id="preview-card">
      <div class="preview-label">Preview</div>
      <div class="preview-evt">
        <div class="preview-bar" id="preview-bar"></div>
        <div>
          <div class="preview-title" id="preview-title"></div>
          <div class="preview-meta" id="preview-meta"></div>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="form-actions">
      <button class="btn-ghost" onclick="clearForm()">Clear</button>
      <button class="btn-save" id="btn-save" onclick="saveEvent()">Save event</button>
    </div>

    <p class="byline">Built by <strong>Jerome Winston</strong> · Chronify team</p>

  </main>

  <script>
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    let selectedColor = '#1D9E75';

    const catStyleMap = {
      'Work':     'sel-work',
      'Focus':    'sel-focus',
      'Personal': 'sel-personal',
      'Social':   'sel-social',
      'Break':    'sel-break',
      'Other':    'sel-other',
    };

    function selCat(el) {
      document.querySelectorAll('.catopt').forEach(b => {
        b.className = 'catopt';
      });
      el.classList.add(catStyleMap[el.dataset.cat] || '');
    }

    function selColor(el) {
      document.querySelectorAll('.cdot').forEach(d => d.classList.remove('sel'));
      el.classList.add('sel');
      selectedColor = el.dataset.color;
      document.getElementById('preview-bar').style.background = selectedColor;
    }

    function selPill(el) {
      const group = el.closest('.pill-opts');
      group.querySelectorAll('.pillopt').forEach(b => b.classList.remove('sel'));
      el.classList.add('sel');
    }

    function fmt12(t) {
      if (!t) return '';
      const [h, m] = t.split(':').map(Number);
      const ap = h >= 12 ? 'PM' : 'AM';
      return ((h % 12) || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + ap;
    }

    function updatePreview() {
      const title = document.getElementById('f-title').value.trim();
      const date  = document.getElementById('f-date').value;
      const start = document.getElementById('f-start').value;
      const end   = document.getElementById('f-end').value;
      const card  = document.getElementById('preview-card');

      if (!title) { card.classList.remove('visible'); return; }
      card.classList.add('visible');

      document.getElementById('preview-title').textContent = title;
      document.getElementById('preview-bar').style.background = selectedColor;

      let meta = '';
      if (date) {
        const [y, mo, d] = date.split('-');
        meta += months[parseInt(mo) - 1] + ' ' + parseInt(d) + ', ' + y;
      }
      if (start) {
        meta += (meta ? ' · ' : '') + fmt12(start) + (end ? ' – ' + fmt12(end) : '');
      }
      document.getElementById('preview-meta').textContent = meta || 'No date set';
    }

    function clearForm() {
      ['f-title','f-date','f-start','f-end','f-loc','f-notes'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('preview-card').classList.remove('visible');
      document.getElementById('success-banner').classList.remove('visible');
    }

    function saveEvent() {
      const title = document.getElementById('f-title').value.trim();
      if (!title) { document.getElementById('f-title').focus(); return; }
      document.getElementById('success-banner').classList.add('visible');
      const btn = document.getElementById('btn-save');
      btn.textContent = 'Saved!';
      btn.style.background = '#0F6E56';
      setTimeout(() => { btn.textContent = 'Save event'; btn.style.background = ''; }, 2000);
    }
  </script>

</body>
</html>
